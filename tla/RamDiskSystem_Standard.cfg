SPECIFICATION Spec

CONSTANTS
    MaxPages = 4
    NumFiles = 2

INVARIANTS
    TypeOK
    PoolConsistent
    NoPageLeak
    CommittedWithinCapacity
    FreeBytesAccurate
    SingleFileCap
    ReservationsConsistent
    DataIntegrity
    DeadFilesClean
    ReadConsistent

\* Liveness disabled — state space too large for temporal checking
\* with concurrent SetLength during write phases (~1B+ distinct states).
\* Use Minimal (3p×2f) or Medium (3p×3f) for WriteTerminates verification.
